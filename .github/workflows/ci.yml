name: SSZ CI

on:
  push:
    branches: [ main, develop, 'v*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-timeout numpy scipy h5py sympy matplotlib
        pip install -e ".[all,dev]"

    - name: Run core tests (no smoke)
      run: |
        python -m pytest -q -k "not simulation_smoke" --tb=short

    - name: Run tensor core tests
      run: |
        python -m pytest tests/test_tensor_core_*.py -v --tb=short

    - name: Run SSZ validation tests
      run: |
        python -m pytest tests/test_ssz_*.py -v --tb=short

    - name: Run observable tests
      run: |
        python -m pytest tests/test_observable_*.py -v --tb=short

    - name: Check energy proxy separation
      run: |
        python -m pytest tests/test_energy_proxy_*.py -v

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        pip install ruff black isort

    - name: Check formatting with black
      run: |
        black --check src/ tests/ || true

    - name: Check imports with isort
      run: |
        isort --check-only src/ tests/ || true

    - name: Lint with ruff
      run: |
        ruff check src/ tests/ || true

  claim-gate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -e ".[all]"

    - name: Check for forbidden claims in source
      run: |
        # Check for forbidden claim language
        grep -r "COMPLETE MATHEMATICAL PROOF" src/ && exit 1 || echo "✓ No complete proof claims"
        grep -r "ALL THEOREMS PROVEN" src/ && exit 1 || echo "✓ No all theorems claims"
        grep -r "HUMAN TRANSPORT POSSIBLE" src/ && exit 1 || echo "✓ No human transport claims"
        grep -r "PHYSICALLY PROVEN" src/ && exit 1 || echo "✓ No physically proven claims"

    - name: Check documentation claims
      run: |
        # Check docs for overclaiming
        grep -ri "solved beaming" docs/ README.md && exit 1 || echo "✓ No solved beaming claims"
        grep -ri "proven transport" docs/ README.md && exit 1 || echo "✓ No proven transport claims"

  docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Test documentation examples
      run: |
        pip install -e ".[all]"
        # Run any doctests
        python -m doctest src/beam_ssz/tensor_core/*.py -v || true

  numerical-gr:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install numpy scipy h5py

    - name: Test numerical GR pipeline
      run: |
        cd numerical_gr
        PYTHONPATH=../src timeout 60 python pipeline.py
        ls -la *.h5 *.par 2>/dev/null && echo "✓ Generated output files"
